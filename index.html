<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>
        <div class="selected-items">
            <div class="item">Rock</div>
            <div class="item">Paper</div>
            <div class="item">Scissors</div>
        </div>
        <div class="objects">
            <h1>Player: <span id="player"></span></h1>
            <h1>Computer: <span id="computer"></span></h1>
            <h1>Score: <span id="score"></span></h1>
        </div>
        <h1 class="scoreText">Scores</h1>
         <div class="score">
            <h1>Player: <span id="playerscore"></span></h1>
            <h1>Computer: <span id="computerscore"></span></h1>
            <h1>Draw: <span id="drawScore"></span></h1>
        </div>
        <button>Reset</button>
    </div>
    <script src="index.js"></script>
</body>
</html>
